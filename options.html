<!DOCTYPE html>
<html>
<head>
  <title>Local AI Chat - Options</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: #0b0d11;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .panel {
      background-color: #151820;
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid #2e3342;
      text-align: center;
      max-width: 400px;
    }
    h1 {
      margin-top: 0;
      font-size: 1.5rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #2563eb;
    }
    .status {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #10b981;
      display: none;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Microphone Permission</h1>
    <p>To use the Live Voice Chat feature in the side panel, you must first grant microphone permissions on this page.</p>
    <button id="request-mic">Grant Microphone Access</button>
    <div id="status" class="status">Permission Granted! You can close this tab.</div>
  </div>
  <script src="options.js"></script>
</body>
</html>
