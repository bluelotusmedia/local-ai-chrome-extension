<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local AI Chat</title>
  <link rel="stylesheet" href="sidepanel.css">
  <link rel="stylesheet" href="assets/github-dark.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="assets/marked.min.js"></script>
  <script src="assets/highlight.min.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-title">
        <div class="status-indicator" id="connection-status"></div>
        <h1>Local AI Chat</h1>
      </div>
      <div class="header-actions" style="display:flex;">
        <button id="live-mode-toggle-btn" class="icon-btn" title="Toggle Live Mode (OFF)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>
        </button>
        <button id="live-mute-toggle-btn" class="icon-btn" title="Mute Live Response" style="display:none;">
          <svg class="icon-unmuted" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
          <svg class="icon-muted" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
        </button>
        <button id="new-chat-btn" class="icon-btn" title="Start New Chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="form-group">
        <label for="endpoint-url">LM Studio Server URL</label>
        <input type="text" id="endpoint-url" value="http://localhost:1234/v1/chat/completions">
      </div>
      <div class="form-group">
        <label for="model-select">Local Model</label>
        <div style="display:flex; gap:0.5rem;">
          <select id="model-select" style="flex:1;">
             <option value="local-model">Loading models...</option>
          </select>
          <button id="refresh-models-btn" class="icon-btn" title="Refresh Models" style="padding:0.2rem; display:flex; align-items:center; justify-content:center; background:var(--bg-surface); border:1px solid var(--border-color); border-radius:4px; color:var(--text-muted); cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="persona-select">Persona / Mode</label>
        <select id="persona-select">
           <option value="general">General Assistant (Default)</option>
           <option value="financial">Financial & Tax Assistant</option>
           <option value="reviewer">Strict Code Reviewer</option>
           <option value="copywriter">SEO Copywriter</option>
           <option value="blue-lotus">Blue Lotus AI</option>
           <option value="custom">Custom</option>
        </select>
      </div>
      <div class="form-group" id="custom-prompt-container" style="display:none;">
        <label for="system-prompt">Custom System Prompt</label>
        <textarea id="system-prompt" rows="5">You are a helpful AI assistant. You are given the content of a webpage. Answer the user's questions based on this webpage's content.</textarea>
      </div>
      <div class="form-group settings-group" style="padding-top: 0.8rem; border-top: 1px solid var(--border-color); margin-top: 0.5rem;">
        <label style="color: var(--accent); font-weight: 600; font-size: 0.75rem; text-transform: uppercase;">Audio In / Out</label>
        
        <label for="voice-select" style="margin-top: 0.8rem;">Voice Engine (Audio Out)</label>
        <select id="voice-select">
           <option value="default">Default System Voice</option>
        </select>
        
        <label style="margin-top: 0.8rem;">Microphone (Audio In)</label>
        <button type="button" id="mic-settings-link" style="width: 100%; text-align: left; padding: 0.5rem 0.8rem; background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-size: 0.85rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
            <span>Choose Hardware...</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
        </button>
      </div>
      <button id="save-settings-btn" class="primary-btn">Save Settings</button>
    </div>

    <div class="chat-container">
      <div id="chat-history" class="chat-history">
        <!-- Messages will be injected here -->
        <div class="message system-msg">
          <div class="message-content">Hello! Open any web page and ask me questions about it. Ensure LM Studio's Local Server is running.</div>
        </div>
      </div>
      
      <div class="input-area">
        <div class="context-row">
          <div class="context-pill" id="context-pill" title="Page context loaded">
            Context Loaded
          </div>
          <div class="quick-actions" id="quick-actions">
            <button class="quick-action-btn" data-prompt="Summarize the main points concisely.">Summarize</button>
            <button class="quick-action-btn" data-prompt="What are the key takeaways?">Takeaways</button>
            <button class="quick-action-btn" data-prompt="Explain this simply.">Explain</button>
            <button class="quick-action-btn" data-prompt="Extract action items or tasks.">Action Items</button>
          </div>
        </div>
        <div id="attachments-container" class="attachments-container"></div>
        <form id="chat-form">
          <input type="file" id="file-upload" style="display:none;" multiple accept=".txt,.md,.csv,.json,.html,.css,.js,.py,.log,.xml,.pdf">
          <input type="file" id="image-upload" style="display:none;" multiple accept="image/png,image/jpeg,image/webp">
          <button type="button" id="attach-btn" class="icon-btn action-btn" title="Attach Document">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
          </button>
          <button type="button" id="screenshot-btn" class="icon-btn action-btn" title="Upload Image">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          </button>
          <textarea id="user-input" placeholder="Ask something..." rows="1" required></textarea>
          <button type="button" id="mic-btn" class="icon-btn action-btn" title="Use Voice">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
          <button type="submit" id="send-btn" title="Send" class="action-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </form>
      </div>
    </div>
  </div>
  
  <script src="pdf.min.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
